- hosts: all
  become: yes
  gather_facts: yes

  vars:
    ssl_cert_dir: /etc/nginx/ssl
    ssl_cert: /etc/nginx/ssl/server.crt
    ssl_key: /etc/nginx/ssl/server.key

    nginx_ssl_conf_redhat: |
      server {
          listen 80;
          server_name _;
          return 301 https://$host$request_uri;
      }

      server {
          listen 443 ssl;
          server_name _;

          ssl_certificate     /etc/nginx/ssl/server.crt;
          ssl_certificate_key /etc/nginx/ssl/server.key;

          ssl_protocols       TLSv1.2 TLSv1.3;
          ssl_ciphers         HIGH:!aNULL:!MD5;

          root  /usr/share/nginx/html;
          index index.html;

          location / {
              try_files $uri $uri/ =404;
          }
      }

    nginx_ssl_conf_debian: |
      server {
          listen 80;
          server_name _;
          return 301 https://$host$request_uri;
      }

      server {
          listen 443 ssl;
          server_name _;

          ssl_certificate     /etc/nginx/ssl/server.crt;
          ssl_certificate_key /etc/nginx/ssl/server.key;

          ssl_protocols       TLSv1.2 TLSv1.3;
          ssl_ciphers         HIGH:!aNULL:!MD5;

          root  /var/www/html;
          index index.html;

          location / {
              try_files $uri $uri/ =404;
          }
      }

    landing_page_html: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <title>Tines + Terraform + Ansible</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
          * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
          }
          body {
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
              "Segoe UI", sans-serif;
            color: #f9fafb;
            background: radial-gradient(circle at top left, #5e5df0 0, #111827 45%, #020617 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
          }
          .shell {
            max-width: 900px;
            width: 100%;
            background: rgba(15, 23, 42, 0.92);
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            box-shadow:
              0 18px 45px rgba(15, 23, 42, 0.8),
              0 0 0 1px rgba(15, 23, 42, 0.8);
            overflow: hidden;
          }
          .shell-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1.3rem;
            background: radial-gradient(circle at top left, #6366f1, #111827);
            border-bottom: 1px solid rgba(148, 163, 184, 0.35);
          }
          .shell-dots {
            display: flex;
            gap: 0.35rem;
          }
          .dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: #f97373;
          }
          .dot:nth-child(2) { background: #facc15; }
          .dot:nth-child(3) { background: #4ade80; }
          .shell-title {
            font-size: 0.8rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: rgba(249, 250, 251, 0.82);
          }
          .shell-body {
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
            gap: 2rem;
            padding: 2.25rem 2.5rem 2.3rem;
          }
          @media (max-width: 800px) {
            .shell-body {
              grid-template-columns: minmax(0, 1fr);
              padding: 1.8rem 1.5rem 1.9rem;
            }
          }
          .headline {
            font-size: 2rem;
            line-height: 1.15;
            font-weight: 700;
            letter-spacing: -.03em;
            margin-bottom: 0.75rem;
          }
          .headline span {
            color: #a5b4fc;
          }
          .subheadline {
            color: #9ca3af;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.6rem;
          }
          .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            border-radius: 999px;
            padding: 0.22rem 0.7rem 0.22rem 0.25rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.55);
            color: #e5e7eb;
            margin-bottom: 0.9rem;
          }
          .pill-dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: #4ade80;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
          }
          .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-bottom: 1.8rem;
          }
          .badge {
            font-size: 0.75rem;
            color: #e5e7eb;
            background: rgba(30, 64, 175, 0.35);
            border-radius: 999px;
            padding: 0.22rem 0.7rem;
            border: 1px solid rgba(129, 140, 248, 0.5);
          }
          .cta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
          }
          .btn-primary {
            border-radius: 999px;
            border: none;
            padding: 0.6rem 1.4rem;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: .02em;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            cursor: default;
            box-shadow:
              0 12px 25px rgba(79, 70, 229, 0.6),
              0 0 0 1px rgba(129, 140, 248, 0.7);
          }
          .hint {
            font-size: 0.8rem;
            color: #9ca3af;
          }
          .hint code {
            background: rgba(15, 23, 42, 0.8);
            padding: 0.15rem 0.35rem;
            border-radius: 4px;
            border: 1px solid rgba(55, 65, 81, 0.9);
            font-size: 0.8rem;
          }
          .side-panel {
            background: radial-gradient(circle at top, rgba(129, 140, 248, 0.16), rgba(15, 23, 42, 0.95));
            border-radius: 16px;
            border: 1px solid rgba(55, 65, 81, 0.9);
            padding: 1.4rem 1.3rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.78rem;
            color: #e5e7eb;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
          }
          .tag {
            color: #34d399;
          }
          .attr {
            color: #93c5fd;
          }
          .val {
            color: #fbbf24;
          }
          .comment {
            color: #6b7280;
          }
        </style>
      </head>
      <body>
        <main class="shell">
          <header class="shell-header">
            <div class="shell-dots">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
            <div class="shell-title">Tines · Terraform · Ansible</div>
          </header>
          <section class="shell-body">
            <div>
              <div class="pill">
                <span class="pill-dot"></span>
                Live environment ready
              </div>
              <h1 class="headline">
                Hello from <span>Tines + Terraform + Ansible</span>
              </h1>
              <p class="subheadline">
                This server was provisioned by Terraform, configured by Ansible,
                and is now ready to host your next workflow or web application.
              </p>
              <div class="badge-row">
                <span class="badge">Automated provision</span>
                <span class="badge">Idempotent deploys</span>
                <span class="badge">Cloud-native</span>
              </div>
              <div class="cta-row">
                <button class="btn-primary">
                  Connected successfully
                </button>
                <span class="hint">
                  This page was generated automatically by your demo workflow.
                </span>
              </div>
            </div>
            <aside class="side-panel">
              <div class="comment"># Request snapshot</div>
              <div>&lt;<span class="tag">request</span>
                <span class="attr">source</span>=<span class="val">"tines"</span>
                <span class="attr">orchestrator</span>=<span class="val">"terraform"</span>&gt;</div>
              <div class="comment"># Response from this server</div>
              <div>&lt;<span class="tag">response</span>
                <span class="attr">status</span>=<span class="val">"200"</span>
                <span class="attr">service</span>=<span class="val">"nginx"</span>&gt;</div>
              <div>  &lt;<span class="tag">message</span>&gt;Hello from your automated lab&lt;/<span class="tag">message</span>&gt;</div>
              <div>&lt;/<span class="tag">response</span>&gt;</div>
            </aside>
          </section>
        </main>
      </body>
      </html>

  tasks:
    # ── Package installation ────────────────────────────────────────────────

    - name: Install nginx and openssl on Amazon Linux / RedHat
      yum:
        name:
          - nginx
          - openssl
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install nginx and openssl on Debian/Ubuntu
      apt:
        name:
          - nginx
          - openssl
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    # ── TLS certificate ─────────────────────────────────────────────────────

    - name: Create SSL certificate directory
      file:
        path: "{{ ssl_cert_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Generate self-signed SSL certificate (valid 365 days)
      command: >
        openssl req -x509 -nodes -days 365
        -newkey rsa:2048
        -keyout {{ ssl_key }}
        -out {{ ssl_cert }}
        -subj "/C=US/ST=State/L=City/O=Org/CN=localhost"
      args:
        creates: "{{ ssl_cert }}"   # idempotent – skip if cert already exists

    - name: Restrict SSL key permissions
      file:
        path: "{{ ssl_key }}"
        owner: root
        group: root
        mode: "0600"

    # ── Nginx HTTPS configuration ────────────────────────────────────────────

    - name: Deploy nginx SSL config on Amazon Linux / RedHat
      copy:
        dest: /etc/nginx/conf.d/ssl.conf
        content: "{{ nginx_ssl_conf_redhat }}"
      notify: Reload nginx
      when: ansible_os_family == "RedHat"

    - name: Remove default nginx site on Debian/Ubuntu
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      when: ansible_os_family == "Debian"

    - name: Deploy nginx SSL config on Debian/Ubuntu
      copy:
        dest: /etc/nginx/sites-available/ssl.conf
        content: "{{ nginx_ssl_conf_debian }}"
      notify: Reload nginx
      when: ansible_os_family == "Debian"

    - name: Enable SSL site on Debian/Ubuntu
      file:
        src: /etc/nginx/sites-available/ssl.conf
        dest: /etc/nginx/sites-enabled/ssl.conf
        state: link
      notify: Reload nginx
      when: ansible_os_family == "Debian"

    # ── Landing page ─────────────────────────────────────────────────────────

    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Deploy landing page on Amazon Linux / RedHat
      copy:
        dest: /usr/share/nginx/html/index.html
        content: "{{ landing_page_html }}"
      when: ansible_os_family == "RedHat"

    - name: Deploy landing page on Debian/Ubuntu
      copy:
        dest: /var/www/html/index.html
        content: "{{ landing_page_html }}"
      when: ansible_os_family == "Debian"

  # ── Handlers ───────────────────────────────────────────────────────────────

  handlers:
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
