- hosts: all
  become: yes
  tasks:
    - name: Install nginx
      yum:
        name: nginx
        state: present
      when: ansible_os_family == "RedHat"

    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create hello world page
      copy:
        dest: /usr/share/nginx/html/index.html
        content: "<h1>Hello from Tines + Terraform + Ansible!</h1>"
