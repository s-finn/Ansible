- hosts: all
  become: yes
  tasks:
    - name: Install nginx on Amazon/RedHat
      yum:
        name: nginx
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install nginx on Debian/Ubuntu
      apt:
        name: nginx
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create hello world page on Amazon/RedHat
      copy:
        dest: /usr/share/nginx/html/index.html
        content: "<h1>Hello from Tines + Terraform + Ansible!</h1>"
      when: ansible_os_family == "RedHat"

    - name: Create hello world page on Debian/Ubuntu
      copy:
        dest: /var/www/html/index.html
        content: "<h1>Hello from Tines + Terraform + Ansible!</h1>"
      when: ansible_os_family == "Debian"
